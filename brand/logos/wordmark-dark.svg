  <line x1="22" y1="7.7"  x2="22" y2="36.3" stroke="#C8F046" stroke-width="1.65"/>
  <line x1="7.7" y1="22"  x2="36.3" y2="22"  stroke="#C8F046" stroke-width="1.65"/>
  <line x1="11.55" y1="11.55" x2="32.45" y2="32.45" stroke="#C8F046" stroke-width="1.1" stroke-opacity="0.6"/>
